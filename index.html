<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Yazma PRO</title>

<style>
body { margin:0; background:black; overflow:hidden; font-family:'Segoe UI',Tahoma,sans-serif; }
canvas { position:absolute; top:0; left:0; }

#status {
    position:fixed;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:12px 20px;
    border-radius:30px;
    z-index:10;
    backdrop-filter:blur(5px);
}

.control-panel {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(30,30,30,0.9);
    backdrop-filter:blur(10px);
    padding:15px 25px;
    border-radius:50px;
    display:flex;
    gap:20px;
    z-index:20;
    flex-wrap:wrap;
    justify-content:center;
}

button {
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:all 0.3s;
}

button:hover {
    background:rgba(255,255,255,0.2);
}

.color-picker {
    display:flex;
    gap:10px;
    align-items:center;
}

.color-dot {
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
}

.color-dot.selected {
    border-color:white;
}

.color-dot[data-color="green"] { background:#00ff00; }
.color-dot[data-color="red"] { background:#ff0000; }
.color-dot[data-color="blue"] { background:#0000ff; }
.color-dot[data-color="yellow"] { background:#ffff00; }
.color-dot[data-color="white"] { background:#ffffff; }

#coords {
    position:fixed;
    top:20px;
    right:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px 15px;
    border-radius:20px;
    z-index:10;
}
</style>
</head>

<body>

<div id="status">🔄 Yükleniyor...</div>
<div id="coords">📌 Pozisyon: - , -</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div class="control-panel">
    <div class="color-picker">
        <div class="color-dot selected" data-color="green" onclick="setColor('green')"></div>
        <div class="color-dot" data-color="red" onclick="setColor('red')"></div>
        <div class="color-dot" data-color="blue" onclick="setColor('blue')"></div>
        <div class="color-dot" data-color="yellow" onclick="setColor('yellow')"></div>
        <div class="color-dot" data-color="white" onclick="setColor('white')"></div>
    </div>
    
    <button onclick="clearCanvas()">🗑️ Temizle</button>
    <button onclick="saveDrawing()">💾 Kaydet</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.3/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<script>
// Renk eşleştirme
const colorMap = {
    'green': '#00ff00',
    'red': '#ff0000',
    'blue': '#0000ff',
    'yellow': '#ffff00',
    'white': '#ffffff'
};

let currentColor = '#00ff00';
let lastX = null;
let lastY = null;
let isDrawing = true;

// DOM elementleri
const statusText = document.getElementById("status");
const coordsText = document.getElementById("coords");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Canvas ayarları
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.lineWidth = 5;
ctx.strokeStyle = currentColor;

// Pencere boyutu değişince
window.addEventListener('resize', () => {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.putImageData(imageData, 0, 0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 5;
    ctx.strokeStyle = currentColor;
});

// Renk seçme
window.setColor = (color) => {
    currentColor = colorMap[color];
    ctx.strokeStyle = currentColor;
    
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.classList.remove('selected');
        if(dot.dataset.color === color) {
            dot.classList.add('selected');
        }
    });
};

// Temizleme
window.clearCanvas = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};

// Kaydetme
window.saveDrawing = () => {
    const link = document.createElement('a');
    link.download = `cizim-${new Date().getTime()}.png`;
    link.href = canvas.toDataURL();
    link.click();
};

// MediaPipe eller
window.onload = async () => {
    try {
        if (typeof Hands === "undefined") {
            statusText.innerText = "❌ MediaPipe yüklenemedi!";
            return;
        }

        statusText.innerText = "✅ Kamera başlatılıyor...";

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.3/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                statusText.innerText = "👋 El bekleniyor...";
                lastX = null;
                lastY = null;
                coordsText.innerText = "📌 Pozisyon: - , -";
                return;
            }

            statusText.innerText = "✋ El algılandı!";
            
            const landmarks = results.multiHandLandmarks[0];
            const indexTip = landmarks[8]; // İşaret parmağı ucu
            
            const x = indexTip.x * canvas.width;
            const y = indexTip.y * canvas.height;
            
            // Koordinatları göster
            coordsText.innerText = `📌 İşaret: ${Math.round(x)}, ${Math.round(y)}`;
            
            // Çizim yap
            if (isDrawing && lastX && lastY) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            
            lastX = x;
            lastY = y;
        });

        // Kamerayı başlat
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
            },
            width: 640,
            height: 480
        });

        await camera.start();
        statusText.innerText = "✅ Hazır! İşaret parmağınızla yazın";
        
    } catch (error) {
        console.error("Hata:", error);
        statusText.innerText = "❌ Hata oluştu: " + error.message;
    }
};
</script>
</body>
</html>
