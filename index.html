<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Yazma PRO - Gelişmiş Versiyon</title>

<style>
body { margin:0; background:black; overflow:hidden; font-family:'Segoe UI',Tahoma,sans-serif; }
canvas { position:absolute; top:0; left:0; }

#status {
    position:fixed;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:12px 20px;
    border-radius:30px;
    z-index:10;
    backdrop-filter:blur(5px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.control-panel {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(30,30,30,0.9);
    backdrop-filter:blur(10px);
    padding:15px 25px;
    border-radius:50px;
    display:flex;
    gap:20px;
    z-index:20;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    flex-wrap:wrap;
    justify-content:center;
}

button {
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:all 0.3s;
    min-width:100px;
}

button:hover {
    background:rgba(255,255,255,0.2);
    transform:scale(1.05);
}

button.active {
    background:#4CAF50;
    border-color:#45a049;
}

.color-picker {
    display:flex;
    gap:10px;
    align-items:center;
}

.color-dot {
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
    transition:all 0.3s;
}

.color-dot:hover {
    transform:scale(1.2);
}

.color-dot.selected {
    border-color:white;
    box-shadow:0 0 15px currentColor;
}

.slider-container {
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
}

input[type=range] {
    width:100px;
    background:transparent;
}

#coords {
    position:fixed;
    top:20px;
    right:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
    z-index:10;
}

.finger-info {
    position:fixed;
    bottom:100px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
    z-index:10;
}

.eraser-mode {
    position:fixed;
    bottom:100px;
    right:20px;
    color:white;
    background:rgba(255,0,0,0.5);
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
    z-index:10;
    display:none;
}
</style>
</head>

<body>

<div id="status">🔄 Yükleniyor...</div>
<div id="coords">📌 Pozisyon: - , -</div>
<div class="finger-info">👉 İşaret parmağı: Çizim | 🤙 Başparmak: Silgi</div>
<div class="eraser-mode" id="eraserMode">🧹 Silgi Modu Aktif</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div class="control-panel">
    <div class="color-picker">
        <div class="color-dot selected" style="background:#00ff00;" onclick="setColor('#00ff00')"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000')"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff')"></div>
        <div class="color-dot" style="background:#ffff00;" onclick="setColor('#ffff00')"></div>
        <div class="color-dot" style="background:#ff00ff;" onclick="setColor('#ff00ff')"></div>
        <div class="color-dot" style="background:#00ffff;" onclick="setColor('#00ffff')"></div>
        <div class="color-dot" style="background:#ffffff;" onclick="setColor('#ffffff')"></div>
    </div>
    
    <div class="slider-container">
        <span>✏️</span>
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <span id="sizeValue">5</span>
    </div>
    
    <button onclick="clearCanvas()">🗑️ Temizle</button>
    <button onclick="toggleDrawing()" id="toggleBtn">⏸️ Duraklat</button>
    <button onclick="saveDrawing()">💾 Kaydet</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// Global değişkenler
let currentColor = '#00ff00';
let brushSize = 5;
let isDrawing = true;
let lastX = null;
let lastY = null;
let isEraser = false;

// DOM elementleri
const statusText = document.getElementById("status");
const coordsText = document.getElementById("coords");
const eraserModeDiv = document.getElementById("eraserMode");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Canvas ayarları
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// Pencere boyutu değişince canvas'ı güncelle
window.addEventListener('resize', () => {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.putImageData(imageData, 0, 0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
});

// Fırça boyutu slider'ı
document.getElementById('brushSize').addEventListener('input', (e) => {
    brushSize = parseInt(e.target.value);
    document.getElementById('sizeValue').textContent = brushSize;
});

// Renk seçme fonksiyonu (global)
window.setColor = (color) => {
    currentColor = color;
    isEraser = false;
    eraserModeDiv.style.display = 'none';
    
    // Seçili sınıfını güncelle
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.classList.remove('selected');
        if(dot.style.background === color || 
           dot.style.background === `rgb(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)})`) {
            dot.classList.add('selected');
        }
    });
};

// Temizleme fonksiyonu
window.clearCanvas = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};

// Çizimi duraklat/devam ettir
window.toggleDrawing = () => {
    isDrawing = !isDrawing;
    document.getElementById('toggleBtn').textContent = isDrawing ? '⏸️ Duraklat' : '▶️ Devam Et';
    if(!isDrawing) {
        lastX = null;
        lastY = null;
    }
};

// Çizimi kaydet
window.saveDrawing = () => {
    const link = document.createElement('a');
    link.download = `el-yazim-${new Date().getTime()}.png`;
    link.href = canvas.toDataURL();
    link.click();
};

// MediaPipe eller başlatma
window.onload = () => {
    if (typeof Hands === "undefined") {
        statusText.innerText = "❌ MediaPipe yüklenemedi!";
        return;
    }

    statusText.innerText = "✅ Kamera başlatılıyor...";

    const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(results => {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            statusText.innerText = "👋 El bekleniyor...";
            lastX = null;
            lastY = null;
            coordsText.innerText = "📌 Pozisyon: - , -";
            return;
        }

        statusText.innerText = "✋ El algılandı!";
        
        const hand = results.multiHandLandmarks[0];
        
        // İşaret parmağı ucu (8) ve başparmak ucu (4) koordinatları
        const indexTip = hand[8];
        const thumbTip = hand[4];
        
        const indexX = indexTip.x * canvas.width;
        const indexY = indexTip.y * canvas.height;
        const thumbX = thumbTip.x * canvas.width;
        const thumbY = thumbTip.y * canvas.height;
        
        // Koordinatları göster
        coordsText.innerText = `📌 İşaret: ${Math.round(indexX)}, ${Math.round(indexY)}`;
        
        // Silgi modu kontrolü (başparmak ve işaret parmağı yakınsa)
        const distance = Math.hypot(indexX - thumbX, indexY - thumbY);
        const wasEraser = isEraser;
        isEraser = distance < 40; // 40 pikselden yakınsa silgi modu
        
        if(isEraser) {
            eraserModeDiv.style.display = 'block';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.lineWidth = brushSize * 2;
        } else {
            eraserModeDiv.style.display = 'none';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
        }
        
        // Çizim yapma
        if (isDrawing) {
            if (lastX && lastY) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(indexX, indexY);
                
                if(isEraser) {
                    // Silgi modunda arka plan rengiyle çiz (siler gibi gözükür)
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                }
                
                ctx.stroke();
            }
            
            // Silgi modunda kompozisyonu sıfırla
            if(!isEraser) {
                ctx.globalCompositeOperation = 'source-over';
            }
        }
        
        lastX = indexX;
        lastY = indexY;
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 640,
        height: 480
    });

    camera.start();
};

// Parmağın ekranda görsel gösterimi için küçük bir efekt
function drawFingerPointer(x, y, isEraserMode) {
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = isEraserMode ? 'red' : currentColor;
    ctx.beginPath();
    ctx.arc(x, y, brushSize/2, 0, Math.PI * 2);
    ctx.fillStyle = isEraserMode ? 'rgba(255,0,0,0.3)' : currentColor + '33';
    ctx.fill();
    ctx.restore();
}
</script>
</body>
</html>
