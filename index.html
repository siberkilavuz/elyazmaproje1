<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Takibi ile Hava Yazma (Basit Örnek)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            background-color: black;
            color: white;
            font-family: sans-serif;
        }
        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Videoyu ekranı kaplayacak şekilde ölçekle */
        }
        canvas {
            border: 2px solid white; /* Canvas'ı görmek için, isteğe bağlı */
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none; /* Tıklanmayı engelle */
        }
    </style>
</head>
<body>
    <div id="info">Kamera izni ver ve elini kameraya göster. İşaret parmağının ucu takip ediliyor.</div>
    <div id="video-container">
        <video id="video" playsinline style="transform: scaleX(-1);"></video> <!-- Yatay ayna efekti -->
        <canvas id="output-canvas" style="transform: scaleX(-1);"></canvas>
    </div>

    <!-- MediaPipe Kütüphaneleri -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="module">
        // --- MediaPipe Hands için gerekli tanımlamalar ---
        import { Hands, Results } from 'https://cdn.skypack.dev/@mediapipe/hands';
        import { Camera } from 'https://cdn.skypack.dev/@mediapipe/camera_utils';
        import { drawConnectors, drawLandmarks } from 'https://cdn.skypack.dev/@mediapipe/drawing_utils';

        // --- HTML elementlerini seç ---
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // --- MediaPipe Hands nesnesini oluştur ve yapılandır ---
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // El algılama seçenekleri
        hands.setOptions({
            maxNumHands: 1, // Sadece bir eli takip et
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // --- Her sonuç üretildiğinde (her karede) çalışacak fonksiyon ---
        function onResults(results) {
            // Canvas'ı temizle (bir önceki karede çizilenleri sil)
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Video karesini canvas'a arka plan olarak çiz (şeffaflık için yorum satırına alınabilir)
            // canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Eğer bir el algılandıysa
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // İlk elin landmarklarını (noktalarını) al
                const landmarks = results.multiHandLandmarks[0];

                // Elin ana hatlarını çiz (isteğe bağlı, yeşil çizgiler)
                drawConnectors(canvasCtx, landmarks, Hands.HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });

                // Tüm noktaları çiz (isteğe bağlı, kırmızı noktalar)
                // drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', radius: 2 });

                // --- İşaret parmağının ucunu (landmark 8) bul ve belirgin bir şekilde çiz ---
                const indexFingerTip = landmarks[8]; // Landmark 8 = işaret parmağı ucu
                
                if (indexFingerTip) {
                    // Normalize koordinatları (0-1 arası) canvas pixel koordinatlarına çevir
                    const x = indexFingerTip.x * canvasElement.width;
                    const y = indexFingerTip.y * canvasElement.height;

                    // Parmağın ucuna büyük, parlak bir daire çiz (sarı/beyaz)
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 15, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'cyan'; // Neon efekti için cyan
                    canvasCtx.shadowColor = 'white';
                    canvasCtx.shadowBlur = 20;
                    canvasCtx.fill();
                    // Üzerine ikinci bir küçük daire
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 7, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'white';
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.fill();
                    
                    // Gölgeyi sıfırla (sonraki çizimleri etkilememesi için)
                    canvasCtx.shadowBlur = 0;
                }
            }
            canvasCtx.restore();
        }

        // Sonuç işleyiciyi (onResults) MediaPipe Hands nesnesine bağla
        hands.onResults(onResults);

        // --- Kamerayı başlat ve MediaPipe'e bağla ---
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Her karede, video karesini MediaPipe'e gönder
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        camera.start();

        // Canvas boyutlarını ayarla (video ile aynı olmalı)
        canvasElement.width = 1280;
        canvasElement.height = 720;

        console.log("Uygulama başlatıldı. Kamera izni istenecek.");
    </script>
</body>
</html>
