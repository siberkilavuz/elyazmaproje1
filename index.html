<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Senin İçin ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 30px;
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      animation: fadeIn 3s ease-in-out;
    }

    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .photo {
      overflow: hidden;
      border-radius: 25px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      transition: transform 0.4s, box-shadow 0.4s;
    }

    .photo:hover {
      transform: scale(1.08) rotate(1deg);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message {
      margin-top: 20px;
      font-size: 1.1rem;
      padding: 0 20px;
      line-height: 1.6;
    }

    footer {
      margin: 40px 0;
      font-size: 1.2rem;
      font-weight: bold;
      animation: fadeIn 4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>Seninle Her Şey Daha Güzel ❤️</h1>
  <p>Bu sayfa sadece sana özel...</p>

  <div class="gallery">
    <div class="photo"><img src="foto1.jpg"></div>
    <div class="photo"><img src="foto2.jpg"></div>
    <div class="photo"><img src="foto3.jpg"></div>
    <div class="photo"><img src="foto4.jpg"></div>
  </div>

  <div class="message">
    Seninle geçen her an benim için çok değerli... 
    Gülüşün, sesin, her şeyin kalbimde ayrı bir yer kaplıyor.
    İyi ki varsın ❤️
  </div>

  <footer>
    Seni Sonsuza Kadar Seveceğim 💖
  </footer>

  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
